apiVersion: batch/v1
kind: CronJob
metadata:
  name: trainyard-cleanup
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: trainyard-cleanup
    app.kubernetes.io/managed-by: Helm
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: trainyard-cleanup
        spec:
          serviceAccountName: trainyard-cleanup
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: MAX_AGE_DAYS
                  value: {{ .Values.maxAgeDays | quote }}
                - name: NAMESPACE_LABEL
                  value: {{ .Values.namespaceLabel | quote }}
                - name: DEPLOYED_AT_ANNOTATION
                  value: {{ .Values.deployedAtAnnotation | quote }}
                - name: LOG_LEVEL
                  value: {{ .Values.logLevel | quote }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}