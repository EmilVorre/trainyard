suite: namespace tests
templates:
  - namespace.yaml

tests:
  - it: should render a Namespace resource
    asserts:
      - isKind:
          of: Namespace

  - it: should use the configured namespace name
    set:
      namespace: trainyard-system
    asserts:
      - equal:
          path: metadata.name
          value: trainyard-system

  - it: should use a custom namespace name when overridden
    set:
      namespace: my-custom-ns
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-ns

  - it: should have the managed-by Helm label
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should have the app name label
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: trainyard-cleanup
