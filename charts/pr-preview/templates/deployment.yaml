{{- range .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels:
    {{- include "pr-preview.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ .name }}
spec:
  replicas: {{ .replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
    spec:
      {{- /* initContainers — wait for dependencies before starting */}}
      {{- if .dependsOn }}
      initContainers:
        {{- range .dependsOn }}
        - name: wait-for-{{ .service }}
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for {{ .service }}:{{ .port }}..."
              until nc -z {{ .service }} {{ .port }}; do
                echo "{{ .service }}:{{ .port }} not ready — retrying in 2s"
                sleep 2
              done
              echo "{{ .service }}:{{ .port }} is ready"
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .name }}
          image: "{{ if kindIs "map" .image }}{{ .image.repository }}:{{ .image.tag | default "latest" }}{{ else }}{{ .image }}{{ end }}"
          imagePullPolicy: {{ if kindIs "map" .image }}{{ .image.pullPolicy | default "Always" }}{{ else }}Always{{ end }}
          ports:
            - name: http
              containerPort: {{ .port }}
              protocol: TCP
          {{- /* Environment variables from plain values */}}
          {{- if .env }}
          env:
            {{- range .env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- /* Environment variables from Kubernetes secrets */}}
            {{- range .envFromSecrets }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          {{- else if .envFromSecrets }}
          env:
            {{- range .envFromSecrets }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          {{- end }}
          {{- /* Resource limits */}}
          {{- if .resources }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          {{- end }}
{{- end }}