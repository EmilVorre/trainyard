{{- range .Values.jobs }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .name }}
  labels:
    {{- include "pr-preview.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ .name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
    spec:
      restartPolicy: OnFailure
      {{- /* initContainers — wait for dependencies before starting */}}
      {{- if .dependsOn }}
      initContainers:
        {{- range .dependsOn }}
        - name: wait-for-{{ .service }}
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for {{ .service }}:{{ .port }}..."
              until nc -z {{ .service }} {{ .port }}; do
                echo "{{ .service }}:{{ .port }} not ready — retrying in 2s"
                sleep 2
              done
              echo "{{ .service }}:{{ .port }} is ready"
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .name }}
          image: "{{ if kindIs "map" .image }}{{ .image.repository }}:{{ .image.tag | default "latest" }}{{ else }}{{ .image }}{{ end }}"
          imagePullPolicy: {{ if kindIs "map" .image }}{{ .image.pullPolicy | default "Always" }}{{ else }}Always{{ end }}
          {{- if .command }}
          command:
            {{- range .command }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- if .env }}
          env:
            {{- range .env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- range .envFromSecrets }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          {{- else if .envFromSecrets }}
          env:
            {{- range .envFromSecrets }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          {{- end }}
          {{- if .resources }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          {{- end }}
{{- end }}