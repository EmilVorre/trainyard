suite: service tests
templates:
  - service.yaml

tests:
  # ── Basic rendering ────────────────────────────────────────────────────────

  - it: should create a Service for each entry in services
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
        - name: api
          image:
            repository: myorg/api
            tag: "1.0"
          port: 3000
    asserts:
      - hasDocuments:
          count: 2

  - it: should set the correct service name
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: metadata.name
          value: app

  # ── Type ───────────────────────────────────────────────────────────────────

  - it: should always be ClusterIP
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  # ── Port ───────────────────────────────────────────────────────────────────

  - it: should expose the correct port
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080

  - it: should target the http named port on the container
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: spec.ports[0].targetPort
          value: http

  # ── Selector ───────────────────────────────────────────────────────────────

  - it: should select pods by service name
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: app

  - it: should select pods by release instance
    release:
      name: pr-42
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: pr-42

  # ── Labels ─────────────────────────────────────────────────────────────────

  - it: should include the pr-number label
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: metadata.labels["trainyard/pr-number"]
          value: "42"

  - it: should include the service name label
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: app

  # ── Private services still get a Service ──────────────────────────────────

  - it: should create a Service even for private (non-public) services
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: database
          image:
            repository: postgres
            tag: "16"
          port: 5432
          public: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: database
