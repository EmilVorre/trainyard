suite: deployment tests
templates:
  - deployment.yaml

tests:
  - it: should support a plain image string instead of repository/tag object
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: db
          image: postgres:16-alpine
          port: 5432
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "postgres:16-alpine"
