suite: deployment tests
templates:
  - deployment.yaml

tests:
  # ── Basic rendering ────────────────────────────────────────────────────────

  - it: should create a Deployment for each service
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
        - name: api
          image:
            repository: myorg/api
            tag: "1.0"
          port: 3000
    asserts:
      - hasDocuments:
          count: 2

  - it: should set the correct name on the Deployment
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: metadata.name
          value: app

  - it: should default replicas to 1 when not specified
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should use the specified replica count
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
          replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  # ── Image ──────────────────────────────────────────────────────────────────

  - it: should set the correct image
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: myorg/myapp
            tag: "pr-42"
          port: 80
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "myorg/myapp:pr-42"

  - it: should default image tag to latest when not set
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
          port: 80
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "nginx:latest"

  - it: should default imagePullPolicy to Always
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: should respect a custom imagePullPolicy
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: "1.25"
            pullPolicy: IfNotPresent
          port: 80
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent

  # ── Labels ─────────────────────────────────────────────────────────────────

  - it: should include the pr-number label
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: metadata.labels["trainyard/pr-number"]
          value: "42"

  - it: should include the service name label
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: app

  # ── Selector ───────────────────────────────────────────────────────────────

  - it: should match selector labels to pod template labels
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: app
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: app

  # ── Container port ─────────────────────────────────────────────────────────

  - it: should set the correct containerPort
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  # ── Environment variables ──────────────────────────────────────────────────

  - it: should set plain env vars
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
          env:
            - name: NODE_ENV
              value: preview
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: NODE_ENV
      - equal:
          path: spec.template.spec.containers[0].env[0].value
          value: preview

  - it: should set env vars from secrets
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
          envFromSecrets:
            - name: SECRET_KEY
              secretName: my-secret
              secretKey: secret-key
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: SECRET_KEY
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: my-secret
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: secret-key

  - it: should not set env when both env and envFromSecrets are empty
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
          env: []
          envFromSecrets: []
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].env

  # ── Resources ──────────────────────────────────────────────────────────────

  - it: should set resource limits and requests
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "500m"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "256Mi"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "100m"

  - it: should not set resources when not specified
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].resources

  # ── dependsOn / initContainers ─────────────────────────────────────────────

  - it: should create initContainers when dependsOn is set
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
          dependsOn:
            - service: database
              port: 5432
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-database

  - it: should not create initContainers when dependsOn is empty
    set:
      global.prNumber: "42"
      global.domain: preview.vorre.dev
      services:
        - name: app
          image:
            repository: nginx
            tag: latest
          port: 80
          dependsOn: []
    asserts:
      - notExists:
          path: spec.template.spec.initContainers
