name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - yard CLI
        - pr-preview Helm chart
        - cleanup Helm chart
        - deploy.yml workflow
        - teardown.yml workflow
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `yard init`
        2. Choose stack type "App + Database"
        3. ...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Your pr-preview.yml (if relevant)
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell

  - type: input
    id: version
    attributes:
      label: Trainyard version
      placeholder: "v0.1.2 or `yard --version`"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Server OS
      placeholder: "Ubuntu 24.04"
