name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./internal/...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --skip-go-version-check

  helm:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint pr-preview chart
        run: helm lint charts/pr-preview

      - name: Lint cleanup chart
        run: helm lint charts/cleanup

      - name: Template pr-preview chart
        run: |
          helm template test charts/pr-preview \
            --set global.prNumber=1 \
            --set global.domain=preview.example.com

      - name: Template cleanup chart
        run: helm template test charts/cleanup

  build:
    name: Build CLI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          go build -o yard-${{ matrix.os }}-${{ matrix.arch }} ./cmd/yard
