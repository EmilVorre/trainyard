name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  go-unittest:
    name: Go Unit Tests
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
 
      - name: Run tests
        run: go test -coverprofile=coverage.out ./internal/...
 
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  helm-unittest:
    name: Helm Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false

      - name: Run tests for pr-preview chart
        run: helm unittest charts/pr-preview

      - name: Run tests for cleanup chart
        run: helm unittest charts/cleanup

  chainsaw-e2e:
    name: Chainsaw E2E Tests
    runs-on: ubuntu-latest
    needs: helm-unittest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.CHAINSAW_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@v0.2.14

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cleanup chart
        run: |
          helm upgrade --install cleanup \
            charts/cleanup \
            --namespace trainyard-system \
            --create-namespace \
            --set schedule="0 0 * * *"

      - name: Run Chainsaw tests
        run: chainsaw test --test-dir tests/chainsaw/
        env:
          CHART_PATH: ${{ github.workspace }}/charts/pr-preview