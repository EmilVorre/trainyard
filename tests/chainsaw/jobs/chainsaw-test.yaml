apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: jobs
spec:
  description: >
    Verifies that a job (e.g. migrate) is created as a Kubernetes Job,
    waits for its dependency (db) via initContainer, and completes successfully
    before the app deployment is considered ready.
  steps:
    - name: create-namespace
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: preview-pr-9996
                labels:
                  trainyard.dev/preview: "true"
                annotations:
                  trainyard.dev/deployed-at: "2026-04-03T10:00:00Z"

    - name: helm-install-with-job
      try:
        - script:
            timeout: 2m
            content: |
              helm upgrade --install pr-9996 \
                charts/pr-preview \
                --namespace preview-pr-9996 \
                --set global.prNumber="9996" \
                --set global.domain="preview.vorre.dev" \
                --set ingress.tls=false \
                --set ingress.class=nginx \
                --set "services[0].name=app" \
                --set "services[0].image.repository=nginx" \
                --set "services[0].image.tag=latest" \
                --set "services[0].port=8080" \
                --set "services[0].public=true" \
                --set "services[0].subdomain=pr-{number}" \
                --set "services[0].replicas=1" \
                --set "services[1].name=db" \
                --set "services[1].image=postgres:16-alpine" \
                --set "services[1].port=5432" \
                --set "services[1].public=false" \
                --set "services[1].replicas=1" \
                --set "jobs[0].name=migrate" \
                --set "jobs[0].image.repository=alpine" \
                --set "jobs[0].image.tag=latest" \
                --set "jobs[0].dependsOn[0].service=db" \
                --set "jobs[0].dependsOn[0].port=5432"
            check:
              ($error): ~

    - name: assert-db-deployment-exists
      try:
        - assert:
            timeout: 2m
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: db
                namespace: preview-pr-9996

    - name: assert-app-deployment-exists
      try:
        - assert:
            timeout: 2m
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: app
                namespace: preview-pr-9996

    - name: assert-migrate-job-exists
      try:
        - assert:
            timeout: 2m
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: migrate
                namespace: preview-pr-9996

    - name: assert-migrate-job-has-init-container
      try:
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: migrate
                namespace: preview-pr-9996
              spec:
                template:
                  spec:
                    initContainers:
                      - name: wait-for-db

    - name: assert-migrate-job-has-hook-annotations
      try:
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: migrate
                namespace: preview-pr-9996
                annotations:
                  helm.sh/hook: post-install,post-upgrade
                  helm.sh/hook-delete-policy: before-hook-creation

    - name: assert-db-has-no-ingress
      try:
        - error:
            resource:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: db
                namespace: preview-pr-9996

    - name: assert-migrate-has-no-ingress
      try:
        - error:
            resource:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: migrate
                namespace: preview-pr-9996

      finally:
        - script:
            timeout: 2m
            content: |
              helm uninstall pr-9996 --namespace preview-pr-9996 --ignore-not-found
              kubectl delete namespace preview-pr-9996 --ignore-not-found
